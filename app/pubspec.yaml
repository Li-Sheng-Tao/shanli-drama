name: shanli_drama
description: "山狸看剧 - 短剧聚合平台"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 网络请求
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4

  # 视频播放
  video_player: ^2.9.2
  chewie: ^1.8.5

  # UI组件
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_screenutil: ^5.9.3
  badges: ^3.1.2
  flutter_svg: ^2.0.16

  # 工具
  intl: ^0.19.0
  logger: ^2.5.0
  freezed_annotation: ^2.4.4
  uuid: ^4.5.1

  # 广告（预留）
  # pangolin: ^latest

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  freezed: ^2.5.7
  retrofit_generator: ^9.1.7

flutter:
  uses-material-design: true
