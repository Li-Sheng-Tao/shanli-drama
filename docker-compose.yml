version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: shanli-drama-mysql
    environment:
      MYSQL_ROOT_PASSWORD: shanli_drama_root_password
      MYSQL_DATABASE: shanli_drama
      MYSQL_USER: shanli_drama
      MYSQL_PASSWORD: shanli_drama_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./server/database/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - shanli-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: shanli-drama-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shanli-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS 后端
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shanli-drama-server
    environment:
      DATABASE_URL: "mysql://shanli_drama:shanli_drama_password@mysql:3306/shanli_drama"
      JWT_SECRET: "shanli_drama_jwt_secret_key_2026"
      JWT_EXPIRES_IN: "7d"
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shanli-network
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run start:dev

volumes:
  mysql_data:
  redis_data:

networks:
  shanli-network:
    driver: bridge
